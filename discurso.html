<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Discursos</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; background-color: #121212; color: #e0e0e0; }
        .nav { display: flex; gap: 10px; margin-bottom: 2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav a { color: #b3b3b3; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; }
        .nav a.active { background-color: #0056b3; color: white; }
        .nav a:hover:not(.active) { background-color: #1e1e1e; }
        h2 { color: #ffffff; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: #b3b3b3; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 0.8rem; box-sizing: border-box; background-color: #1e1e1e; color: #ffffff; border: 1px solid #333; border-radius: 4px; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: #0056b3; }
        button { width: 100%; padding: 1rem; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/" class="active">Discursos</a>
        <a href="/oracion">Oraciones</a>
    </div>

    <h2>Asignación de Discurso</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="sexo">Tratamiento:</label>
            <select id="sexo" name="sexo" required>
                <option value="M">Hermano</option>
                <option value="F">Hermana</option>
            </select>
        </div>
        <div class="form-group">
            <label for="nombre">Nombre (Opcional):</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="titulo">Se le ha asignado un discurso de siete minutos...:</label>
            <input type="text" id="titulo" name="titulo" placeholder="Ej. El poder de la fe..." required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="fecha_emision">Fecha de emisión de la invitación:</label>
            <input type="date" id="fecha_emision" name="fecha_emision" value="{{ fecha_emision }}" required>
        </div>
        <div class="form-group">
            <label for="fecha_reunion">Fecha de la reunión (Domingo):</label>
            <input type="date" id="fecha_reunion" name="fecha_reunion" value="{{ fecha_reunion }}" required>
        </div>
        <button type="submit">Generar Invitación</button>
    </form>
</body>
</html>
